site_name: Cal Menut
site_description: Tot el coneixement de Cal Menut, en un sol lloc.
site_url: https://calmenut.marctorrens.com
repo_name: marctorrens/cal-menut-digital-twin
repo_url: https://github.com/marctorrens/cal-menut-digital-twin
edit_uri: edit/main/docs/

theme:
  name: material
  language: ca
  font:
    text: Inter
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: white
      accent: black
  icon:
    logo: material/home

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - search:
      lang: ca

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Inici: index.md
  - La Masia: masia/index.md
  - Projectes: projectes/index.md
  - Coneixement: coneixement/index.md
  - Pendents: pendents/index.md
