site_name: Cal Menut
site_description: Biblioteca tècnica personal de la masia Cal Menut.
site_url: https://marctorrens.github.io/cal-menut-digital-twin/

repo_url: https://github.com/marctorrens/cal-menut-digital-twin
repo_name: marctorrens/cal-menut-digital-twin

use_directory_urls: true

theme:
  name: material
  language: ca
  custom_dir: overrides
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: white
      accent: black

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: false

nav:
  - Cal Menut: index.md
  - La masia: masia/index.md
  - Infraestructures:
      - infraestructures/index.md
      - Electricitat: infraestructures/electricitat.md
      - Aigua: infraestructures/aigua.md
      - Climatització: infraestructures/climatitzacio.md
      - Xarxa i comunicacions: infraestructures/xarxa-comunicacions.md
      - Il·luminació: infraestructures/illuminacio.md
      - Portes i accessos: infraestructures/portes-accessos.md
      - Seguretat: infraestructures/seguretat.md
      - Jardí i exterior: infraestructures/jardi-exterior.md
  - Equipament:
      - equipament/index.md
      - Caldera GreenHeiss: equipament/greenheiss.md
      - Rack de comunicacions: equipament/rack-comunicacions.md
      - Switch UniFi: equipament/switch-unifi.md
      - Motor de la porta: equipament/motor-porta.md
      - Videoporter: equipament/videoporter.md
  - Biblioteca: biblioteca/index.md
  - Projectes: projectes/index.md
