site_name: Cal Menut
site_description: Repositori de reforma, infraestructures i manteniment de Cal Menut.
site_url: https://marctorrens.github.io/cal-menut-digital-twin/

repo_url: https://github.com/marctorrens/cal-menut-digital-twin
repo_name: marctorrens/cal-menut-digital-twin

use_directory_urls: true

theme:
  name: material
  language: ca
  custom_dir: overrides
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: white
      accent: black

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: false

nav:
  - Inici: index.md
  - Projecte:
      - projectes/index.md
      - Reforma: projecte/reforma.md
      - Cronologia: projecte/cronologia.md
      - Decisions: projecte/decisions.md
      - Plànols: projecte/planols.md
  - La Masia: masia/index.md
  - Infraestructures:
      - infraestructures/index.md
      - Masia: infraestructures/masia.md
      - Xarxa i comunicacions: infraestructures/xarxa-comunicacions.md
      - Electricitat: infraestructures/electricitat.md
      - Aigua: infraestructures/aigua.md
      - Climatització: infraestructures/climatitzacio.md
      - Il·luminació: infraestructures/illuminacio.md
      - Seguretat: infraestructures/seguretat.md
      - Portes i accessos: infraestructures/portes-accessos.md
      - Jardí i exterior: infraestructures/jardi-exterior.md
  - Gestió:
      - inventari/index.md
      - Inventari: gestio/inventari.md
      - Documents: gestio/documents.md
      - Manteniment: gestio/manteniment.md
  - Aspectes legals: legal/index.md
  - Pendents: pendents/index.md
