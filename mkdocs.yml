site_name: Cal Menut
site_description: Tot el coneixement de Cal Menut, en un sol lloc.
site_url: https://marctorrens.github.io/cal-menut-digital-twin/

repo_url: https://github.com/marctorrens/cal-menut-digital-twin
repo_name: marctorrens/cal-menut-digital-twin

use_directory_urls: true

theme:
  name: material
  language: ca
  custom_dir: overrides
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: white
      accent: black

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: ca

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: false

nav:
  - Inici: index.md
  - La Masia: masia/index.md
  - Projectes: projectes/index.md
  - Infraestructures: infraestructures/index.md
  - Aspectes legals: legal/index.md
  - Inventari: inventari/index.md
  - Pendents: pendents/index.md